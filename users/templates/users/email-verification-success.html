{% extends 'myapp/base.html' %}

{% block title %}Email Verified - ShopMate{% endblock %}

{% block body %}
<div class="max-w-md mx-auto text-center py-12 px-4 space-y-6">
    <div class="w-16 h-16 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center mx-auto border border-emerald-100 shadow-sm">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    </div>

    <div class="space-y-2">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Email Verified Successfully!</h1>
        <p class="text-sm text-slate-500 leading-relaxed">Your account is now fully active. You can sign in and start exploring products.</p>
    </div>

    <div class="pt-4 flex justify-center">
        <a href="{% url 'login' %}" class="px-6 py-3 bg-slate-900 text-white font-semibold text-sm rounded-xl hover:bg-slate-800 transition-all shadow-sm">
            Sign In Now
        </a>
    </div>
</div>
{% endblock %}
