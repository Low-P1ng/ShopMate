{% extends 'myapp/base.html' %}

{% block title %}Verification Failed - ShopMate{% endblock %}

{% block body %}
<div class="max-w-md mx-auto text-center py-12 px-4 space-y-6">
    <div class="w-16 h-16 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center mx-auto border border-rose-100 shadow-sm">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>

    <div class="space-y-2">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Verification Link Invalid</h1>
        <p class="text-sm text-slate-500 leading-relaxed">The email verification link is invalid or has expired. Please try registering again or contact support.</p>
    </div>

    <div class="pt-4 flex justify-center gap-3">
        <a href="{% url 'register' %}" class="px-6 py-3 bg-slate-900 text-white font-semibold text-sm rounded-xl hover:bg-slate-800 transition-all shadow-sm">
            Register Again
        </a>
    </div>
</div>
{% endblock %}
