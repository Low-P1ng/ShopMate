{% extends 'myapp/base.html' %}

{% block title %}Verification Email Sent - ShopMate{% endblock %}

{% block body %}
<div class="max-w-md mx-auto text-center py-12 px-4 space-y-6">
    <div class="w-16 h-16 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mx-auto border border-indigo-100 shadow-sm">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
    </div>

    <div class="space-y-2">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Check Your Email</h1>
        <p class="text-sm text-slate-500 leading-relaxed">We've sent a verification link to your registered email address. Please click the link in the email to activate your account.</p>
    </div>

    <div class="pt-4 flex flex-col sm:flex-row gap-3 justify-center">
        <a href="{% url 'login' %}" class="px-6 py-3 bg-slate-900 text-white font-semibold text-sm rounded-xl hover:bg-slate-800 transition-all shadow-sm">
            Proceed to Login
        </a>
    </div>
</div>
{% endblock %}
