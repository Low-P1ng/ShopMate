{% extends 'myapp/base.html' %}

{% block title %}Order Error - ShopMate{% endblock %}

{% block body %}
<div class="max-w-md mx-auto text-center py-12 px-4 space-y-6">
    <div class="w-16 h-16 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center mx-auto shadow-sm">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </div>

    <div class="space-y-2">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Order Placement Failed</h1>
        <p class="text-sm text-slate-500 leading-relaxed">We were unable to process your order at this time. Please review your cart or try again.</p>
    </div>

    <div class="pt-4 flex flex-col sm:flex-row gap-3 justify-center">
        <a href="{% url 'cart-overview' %}" class="px-6 py-3 bg-slate-900 text-white font-semibold text-sm rounded-xl hover:bg-slate-800 transition-all shadow-sm">
            Return to Cart
        </a>
        <a href="{% url 'index' %}" class="px-6 py-3 bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl hover:bg-slate-200 transition-colors">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
